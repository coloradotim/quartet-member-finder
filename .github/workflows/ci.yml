name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Supabase migration filenames
        shell: bash
        run: |
          set -euo pipefail

          bad_files="$(
            find supabase/migrations -type f -name '*.sql' \
              | awk -F/ '{
                  file=$NF
                  if (file !~ /^[0-9]{14}_[a-z0-9_]+\.sql$/) print $0
                }'
          )"

          if [ -n "$bad_files" ]; then
            echo "Supabase migration filenames must use YYYYMMDDHHMMSS_descriptive_name.sql:"
            echo "$bad_files"
            exit 1
          fi

      - name: Check for committed secret values
        shell: bash
        run: |
          set -euo pipefail

          tracked_env_files="$(
            git ls-files \
              | grep -E '(^|/)\.env($|\.)' \
              | grep -v -E '(^|/)\.env\.example$' || true
          )"

          if [ -n "$tracked_env_files" ]; then
            echo "Tracked environment files are not allowed, except .env.example:"
            echo "$tracked_env_files"
            exit 1
          fi

          if git grep -n -I -E '(sbp_[A-Za-z0-9_-]{20,}|sb_secret_[A-Za-z0-9_-]{20,}|re_[A-Za-z0-9_-]{20,}|SUPABASE_SERVICE_ROLE_KEY=[^$[:space:]]{12,}|SUPABASE_ACCESS_TOKEN=[^$[:space:]]{12,}|SUPABASE_DB_URL=[^$[:space:]]{12,}|RESEND_API_KEY=[^$[:space:]]{12,}|VERCEL_TOKEN=[^$[:space:]]{12,})' -- ':!docs/**' ':!README.md' ':!.env.example'; then
            echo "Potential committed secret value found. Store production secrets in GitHub Actions, Supabase, Resend, or Vercel settings."
            exit 1
          fi

  validate:
    runs-on: ubuntu-latest
    needs: guardrails

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test:run

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build
